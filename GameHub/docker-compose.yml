services:
  gamehub-api:
    container_name: gamehub-api

    build:
      context: ./GameHub.API
      dockerfile: Dockerfile

    image: gamehub-api:2.0

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Data Source=/app/data/gamehub.db

    volumes:
      - gamehub-data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gamehub-data: