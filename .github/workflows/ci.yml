name: GameHub CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test

    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore GameHub/GameHub.sln

      - name: Build solution
        run: dotnet build GameHub/GameHub.sln --configuration Release --no-restore

      - name: Run automated tests
        run: dotnet test GameHub/GameHub.sln --configuration Release --no-build