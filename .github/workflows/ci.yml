name: GameHub CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test

    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DOTNET_NOLOGO: true
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            GameHub/GameHub.API/packages.lock.json
            GameHub/GameHub.Tests/packages.lock.json

      - name: Restore dependencies
        run: dotnet restore GameHub/GameHub.sln

      - name: Build solution
        run: dotnet build GameHub/GameHub.sln --configuration Release --no-restore

      - name: Run automated tests
        run: >
          dotnet test GameHub/GameHub.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=gamehub-tests.trx"
          --results-directory TestResults

      - name: Build Docker image
        run: >
          docker build
          --file GameHub/GameHub.API/Dockerfile
          --tag gamehub-api:ci
          GameHub/GameHub.API

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gamehub-test-results
          path: TestResults/
          if-no-files-found: error
          retention-days: 14